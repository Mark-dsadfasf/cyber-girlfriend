<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博女友</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: row;
      height: 100vh;
    }
    /* Live2D 画布区域 */
    #canvas-container {
      flex: 2;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: transparent;
    }
    /* 模型选择器 */
    #model-selector {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.6);
      border-radius: 30px;
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .model-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .model-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid transparent;
      transition: all 0.2s ease;
      object-fit: cover;
      background: rgba(255,255,255,0.1);
    }
    .model-item:hover .model-avatar {
      transform: scale(1.1);
      border-color: rgba(255,255,255,0.3);
    }
    .model-item.active .model-avatar {
      border-color: #6366f1;
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
    }
    .model-name {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      text-align: center;
    }
    .model-item.active .model-name {
      color: #fff;
      font-weight: bold;
    }
    /* 聊天区域 */
    #chat-container {
      flex: 1;
      min-width: 350px;
      height: 100vh;
      background: rgba(255,255,255,0.05);
      border-left: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .message {
      margin-bottom: 12px;
      display: flex;
    }
    .message.user {
      justify-content: flex-end;
    }
    .message-content {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.4;
    }
    .message.assistant .message-content {
      background: rgba(255,255,255,0.1);
    }
    .message.user .message-content {
      background: #6366f1;
    }
    .message.system .message-content {
      background: rgba(255,200,0,0.2);
      color: #ffcc00;
    }
    #chat-input-area {
      display: flex;
      padding: 12px 16px;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    #chat-input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    #chat-input:focus {
      border-color: #6366f1;
    }
    #send-btn {
      background: #6366f1;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-btn:hover {
      background: #4f46e5;
    }
    #send-btn:disabled {
      background: #4a4a6a;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <div id="model-selector"></div>
    </div>
    <div id="chat-container">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="输入消息..." />
        <button id="send-btn">发送</button>
      </div>
    </div>
  </div>

  <!-- Live2D Cubism Core (Cubism 4 需要这个) -->
  <script src="/live2dcubismcore.min.js"></script>
  <!-- Live2D Cubism 2.1 Runtime (for haru .moc) -->
  <script src="/live2d.min.js"></script>
  <!-- PIXI.js -->
  <script src="/pixi.min.js"></script>
  <!-- pixi-live2d-display (完整版，支持 Cubism 2/3/4) -->
  <script src="/pixi-live2d-display.min.js"></script>
  <!-- Main App -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
