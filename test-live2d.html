<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Live2D 测试页面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: sans-serif;
    }
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 500px;
      z-index: 999;
    }
    #canvas-container {
      width: 600px;
      height: 600px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
    }
    canvas { display: block; }
  </style>
</head>
<body>

<div id="status">
  <div>⏳ 正在加载依赖...</div>
  <div id="log"></div>
</div>

<div id="canvas-container"></div>

<!-- PIXI.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/pixi.min.js"></script>

<!-- Live2D Cubism 2.1 Runtime (本地文件，需放在同目录) -->
<script src="live2d.min.js"></script>

<!-- pixi-live2d-display (cubism2 版本，CDN 备用) -->
<script>
// 等待 PIXI 加载
function waitForPIXI() {
  return new Promise(resolve => {
    if (window.PIXI) return resolve()
    const check = setInterval(() => {
      if (window.PIXI) { clearInterval(check); resolve() }
    }, 100)
  })
}

async function init() {
  const log = (msg) => {
    console.log(msg)
    document.getElementById('log').innerHTML += msg + '<br>'
  }

  log('⏳ 等待 PIXI 加载...')
  await waitForPIXI()
  log('✅ PIXI 加载成功: v' + PIXI.VERSION)

  // 检查 Live2D Cubism Core
  log('⏳ 检查 Live2D Cubism Core...')
  if (typeof Live2D === 'undefined') {
    log('❌ Live2D Cubism Core 未加载！请确认 live2d.min.js 在同目录')
    return
  }
  log('✅ Live2D Cubism Core 已加载')

  // 检查 pixi-live2d-display
  if (!PIXI.live2d) {
    log('❌ PIXI.live2d 未定义！pixi-live2d-display 未加载')
    log('💡 需要将 cubism2.min.js 放在同目录并引用')
    return
  }
  log('✅ PIXI.live2d 已加载，Live2DModel = ' + typeof PIXI.live2d.Live2DModel)

  const container = document.getElementById('canvas-container')

  const app = new PIXI.Application({
    width: container.offsetWidth,
    height: container.offsetHeight,
    backgroundAlpha: 0
  })
  container.appendChild(app.view)
  log('✅ PIXI Application 创建成功')

  // 尝试加载 haru 模型
  log('⏳ 正在加载 haru 模型...')
  try {
    const model = await PIXI.live2d.Live2DModel.from(
      'http://localhost:5173/models/haru/haru.model.json',
      { autoUpdate: true, autoInteract: true }
    )
    app.stage.addChild(model)
    log('✅ 模型加载成功！尺寸: ' + model.width + 'x' + model.height)

    // 缩放适应容器
    const scale = Math.min(
      container.offsetWidth / model.width,
      container.offsetHeight / model.height
    ) * 0.6
    model.scale.set(scale)
    model.x = (container.offsetWidth - model.width) / 2
    model.y = (container.offsetHeight - model.height) / 2

    log('🎉 模型已显示在画面中央！')
    document.getElementById('status').innerHTML = '🎉 模型加载成功！'
  } catch (err) {
    log('❌ 模型加载失败: ' + err.message)
    log('💡 请确认：<br>1. Vite 在跑 (localhost:5173)<br>2. 模型文件在 public/models/haru/')
  }
}

init()
</script>

</body>
</html>
